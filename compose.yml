services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 30

  auth-service:
    build:
      context: .
      dockerfile: docker/node-service.Dockerfile
    working_dir: /app/auth-service
    env_file: .env
    environment:
      DB_HOST: postgres
      JWT_PRIVATE_KEY: /app/jwt/private.key
      JWT_PUBLIC_KEY: /app/jwt/public.key
    ports:
      - "3001:3001"
    volumes:
      - ./auth-service:/app/auth-service
      - ./docker/scripts:/app/docker/scripts:ro
      - jwt_keys:/app/jwt
      - auth_node_modules:/app/auth-service/node_modules
    command: sh -c "node /app/docker/scripts/ensure-jwt-keys.js /app/jwt && npm install && npm run start:dev"
    depends_on:
      postgres:
        condition: service_healthy

  chat-service:
    build:
      context: .
      dockerfile: docker/node-service.Dockerfile
    working_dir: /app/chat-service
    env_file: .env
    environment:
      DB_HOST: postgres
      JWT_PUBLIC_KEY: /app/jwt/public.key
      WEAVIATE_URL: http://weaviate:8080
      LOCAL_LLM_URL: http://host.docker.internal:8082/v1/chat/completions
    ports:
      - "3002:3002"
    volumes:
      - ./chat-service:/app/chat-service
      - jwt_keys:/app/jwt
      - chat_node_modules:/app/chat-service/node_modules
    command: sh -c "while [ ! -f /app/jwt/public.key ]; do sleep 1; done; npm install && npm run start:dev"
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_started

  chat-ui:
    image: node:22-bookworm-slim
    working_dir: /app/chat-ui
    env_file: .env
    environment:
      AUTH_API_URL: http://auth-service:3001
      CHAT_API_URL: http://chat-service:3002
      WATCHPACK_POLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - ./chat-ui:/app/chat-ui
      - ui_node_modules:/app/chat-ui/node_modules
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0"
    depends_on:
      auth-service:
        condition: service_started
      chat-service:
        condition: service_started

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "127.0.0.1:8088:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      chat-ui:
        condition: service_started
      auth-service:
        condition: service_started
      chat-service:
        condition: service_started

  cloudflared:
    image: cloudflare/cloudflared:2026.5.0
    profiles: ["public"]
    command: tunnel --config /etc/cloudflared/config.yml run
    network_mode: "service:nginx"
    volumes:
      - ./docker/cloudflared/config.yml:/etc/cloudflared/config.yml:ro
      - ${CLOUDFLARED_CREDENTIALS_FILE}:/etc/cloudflared/creds.json:ro
    depends_on:
      nginx:
        condition: service_started
    restart: unless-stopped

  weaviate:
    profiles: ["rag"]
    image: semitechnologies/weaviate:1.26.4
    ports:
      - "8080:8080"
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      DEFAULT_VECTORIZER_MODULE: text2vec-transformers
      ENABLE_MODULES: text2vec-transformers
      TRANSFORMERS_INFERENCE_API: http://t2v-transformers:8080
      CLUSTER_HOSTNAME: node1
    volumes:
      - weaviate_data:/var/lib/weaviate
    depends_on:
      t2v-transformers:
        condition: service_started

  t2v-transformers:
    profiles: ["rag"]
    image: semitechnologies/transformers-inference:sentence-transformers-multi-qa-MiniLM-L6-cos-v1
    environment:
      ENABLE_CUDA: "0"

volumes:
  postgres_data:
  weaviate_data:
  jwt_keys:
  auth_node_modules:
  chat_node_modules:
  ui_node_modules:
